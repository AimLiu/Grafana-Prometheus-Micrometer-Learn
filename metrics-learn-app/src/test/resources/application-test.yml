spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:metrics_learn_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: 192.168.19.64
      port: 6379
      database: 1

management:
  prometheus:
    metrics:
      export:
        enabled: true